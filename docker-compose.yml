version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: tbs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tbs_user
      POSTGRES_PASSWORD: tbs_pass
      POSTGRES_DB: ticket_booking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tbs_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--notify-keyspace-events", "Ex"]

volumes:
  pgdata: